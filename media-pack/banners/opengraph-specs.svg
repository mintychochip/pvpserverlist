<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- OpenGraph Image Spec (1200×630) -->
  
  <!-- Background -->
  <defs>
    <linearGradient id="ogGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d12"/>
      <stop offset="100%" stop-color="#151519"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#ogGradient)"/>
  
  <!-- Accent bar left -->
  <rect x="0" y="0" width="8" height="630" fill="#6366f1"/>
  
  <!-- Logo -->
  <g transform="translate(100, 200)">
    <circle cx="0" cy="-40" r="16" fill="#6366f1"/>
    <circle cx="-35" cy="20" r="16" fill="#6366f1"/>
    <circle cx="35" cy="20" r="16" fill="#6366f1"/>
    <line x1="0" y1="-40" x2="-35" y2="20" stroke="#6366f1" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="-40" x2="35" y2="20" stroke="#6366f1" stroke-width="5" stroke-linecap="round"/>
    <line x1="-35" y1="20" x2="35" y2="20" stroke="#6366f1" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="8" fill="#ec4899"/>
  </g>
  
  <!-- Wordmark -->
  <text x="100" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="600" fill="#f4f4f5">
    GuildPost
  </text>
  
  <!-- Subtext -->
  <text x="100" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a1a1aa">
    Discover Minecraft Servers
  </text>
  
  <!-- Stats / Decorative elements right side -->
  <g transform="translate(750, 180)">
    <!-- Server card mockup -->
    <rect x="0" y="0" width="350" height="120" rx="12" fill="#1e1e24" stroke="#27272a" stroke-width="1"/>
    <rect x="20" y="20" width="60" height="60" rx="8" fill="#27272a"/>
    <rect x="95" y="25" width="200" height="16" rx="4" fill="#3f3f46"/>
    <rect x="95" y="50" width="150" height="12" rx="3" fill="#52525b"/>
    <circle cx="320" cy="60" r="8" fill="#10b981"/>
  </g>
  
  <g transform="translate(750, 320)">
    <!-- Second card -->
    <rect x="0" y="0" width="350" height="120" rx="12" fill="#1e1e24" stroke="#27272a" stroke-width="1"/>
    <rect x="20" y="20" width="60" height="60" rx="8" fill="#27272a"/>
    <rect x="95" y="25" width="180" height="16" rx="4" fill="#3f3f46"/>
    <rect x="95" y="50" width="140" height="12" rx="3" fill="#52525b"/>
    <circle cx="320" cy="60" r="8" fill="#10b981"/>
  </g>
  
  <!-- Bottom URL -->
  <text x="100" y="580" font-family="system-ui, sans-serif" font-size="18" fill="#6366f1">
    guildpost.tech
  </text>
</svg>