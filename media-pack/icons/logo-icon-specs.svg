<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- GuildPost Icon Only - App Icon / Favicon Spec -->
  
  <!-- Background with subtle gradient -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#151519"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- Icon: Connected Nodes forming G -->
  <g transform="translate(256, 256)">
    <!-- Glow effect -->
    <circle cx="0" cy="-60" r="20" fill="#6366f1" opacity="0.3"/>
    <circle cx="-52" cy="30" r="20" fill="#6366f1" opacity="0.3"/>
    <circle cx="52" cy="30" r="20" fill="#6366f1" opacity="0.3"/>
    
    <!-- Top node -->
    <circle cx="0" cy="-60" r="16" fill="#6366f1"/>
    
    <!-- Left node -->
    <circle cx="-52" cy="30" r="16" fill="#6366f1"/>
    
    <!-- Right node -->
    <circle cx="52" cy="30" r="16" fill="#6366f1"/>
    
    <!-- Connecting lines -->
    <line x1="0" y1="-60" x2="-52" y2="30" stroke="#6366f1" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="-60" x2="52" y2="30" stroke="#6366f1" stroke-width="6" stroke-linecap="round"/>
    <line x1="-52" y1="30" x2="52" y2="30" stroke="#6366f1" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Center accent node -->
    <circle cx="0" cy="0" r="8" fill="#ec4899"/>
    
    <!-- Inner highlight -->
    <circle cx="0" cy="0" r="4" fill="#f4f4f5"/>
  </g>
  
  <!-- Safe zone indicator (not part of final export) -->
  <rect x="51" y="51" width="410" height="410" fill="none" stroke="#52525b" stroke-width="1" stroke-dasharray="10,10" opacity="0.5"/>
  <text x="256" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#52525b">
    Safe Zone • 80% Center
  </text>
</svg>