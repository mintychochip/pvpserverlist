<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff006e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4d9e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0a0f1c" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Network connections -->
  <g stroke="url(#nodeGradient)" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <path d="M20 20L32 32"/>
    <path d="M44 20L32 32"/>
    <path d="M20 44L32 32"/>
    <path d="M44 44L32 32"/>
    <path d="M32 12L32 32"/>
    <path d="M32 52L32 32"/>
    <path d="M12 32L32 32"/>
    <path d="M52 32L32 32"/>
  </g>
  
  <!-- Outer nodes -->
  <circle cx="20" cy="20" r="5" fill="url(#nodeGradient)"/>
  <circle cx="44" cy="20" r="5" fill="url(#nodeGradient)"/>
  <circle cx="20" cy="44" r="5" fill="url(#nodeGradient)"/>
  <circle cx="44" cy="44" r="5" fill="url(#nodeGradient)"/>
  <circle cx="32" cy="12" r="4" fill="url(#nodeGradient)"/>
  <circle cx="32" cy="52" r="4" fill="url(#nodeGradient)"/>
  <circle cx="12" cy="32" r="4" fill="url(#nodeGradient)"/>
  <circle cx="52" cy="32" r="4" fill="url(#nodeGradient)"/>
  
  <!-- Center hub -->
  <circle cx="32" cy="32" r="8" fill="url(#centerGradient)"/>
  <circle cx="32" cy="32" r="4" fill="#ffffff" opacity="0.9"/>
</svg>