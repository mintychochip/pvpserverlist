<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Server | GuildPost</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f; 
      color: #fff;
      min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    header { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      padding: 16px 0;
      border-bottom: 1px solid #2a2a3a;
      margin-bottom: 24px;
    }
    header img { height: 32px; }
    .back { 
      color: #00f5d4; 
      text-decoration: none; 
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .loading { text-align: center; padding: 60px 20px; color: #8892b0; }
    .error { 
      text-align: center; 
      padding: 60px 20px; 
      color: #ff3864;
    }
    .server-card {
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 24px;
    }
    .server-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #1a1a25;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .address { 
      font-family: monospace; 
      color: #8892b0; 
      font-size: 14px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 20px 0;
    }
    .stat {
      background: #1a1a25;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-value { 
      font-size: 24px; 
      font-weight: 700; 
      color: #00f5d4;
    }
    .stat-label { 
      font-size: 12px; 
      color: #8892b0; 
      margin-top: 4px;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .tag {
      background: #1a1a25;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      color: #8892b0;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #00f5d4;
      color: #0a0a0f;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff;">
        <img src="/logo.png" alt="GuildPost">
      </a>
    </header>
    
    <a href="/minecraft" class="back">← Back to servers</a>
    
    <div id="content">
      <div class="loading">Loading server...</div>
    </div>
  </div>

  <script>
    const supabaseUrl = 'https://wpxutsdbiampnxfgkjwq.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndweHV0c2RiaWFtcG54ZmdrandxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTEwMDQsImV4cCI6MjA5MDkyNzAwNH0.35hrTSgxQnICpLOY3g6W3eNxxe7DKCc3q165tyb0Ieo';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    
    async function loadServer() {
      const params = new URLSearchParams(window.location.search);
      // Get server ID from query param OR from URL path (handling trailing slashes)
      let serverId = params.get('id');
      if (!serverId) {
        // Extract UUID from path like /servers/UUID or /servers/UUID/
        const pathParts = window.location.pathname.split('/').filter(p => p && p !== 'index.html');
        const potentialId = pathParts[pathParts.length - 1];
        // Validate UUID format
        if (potentialId && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(potentialId)) {
          serverId = potentialId;
        }
      }
      
      if (!serverId) {
        document.getElementById('content').innerHTML = '<div class="error">No server ID provided</div>';
        return;
      }
      
      const { data: server, error } = await supabase
        .from('servers')
        .select('*')
        .eq('id', serverId)
        .single();
      
      if (error || !server) {
        document.getElementById('content').innerHTML = '<div class="error">Server not found</div>';
        return;
      }
      
      const isOnline = server.status === 'online';
      
      document.getElementById('content').innerHTML = `
        <div class="server-card">
          <div class="server-header">
            <div class="icon">⛏</div>
            <div>
              <h1>${server.name}</h1>
              <div class="address">${server.ip}:${server.port}</div>
            </div>
          </div>
          
          <div class="stats">
            <div class="stat">
              <div class="stat-value">${server.players_online || 0}</div>
              <div class="stat-label">Players Online</div>
            </div>
            <div class="stat">
              <div class="stat-value">${server.max_players || 0}</div>
              <div class="stat-label">Max Players</div>
            </div>
            <div class="stat">
              <div class="stat-value">${server.vote_count || 0}</div>
              <div class="stat-label">Votes</div>
            </div>
          </div>
          
          ${server.description ? `<p style="color: #8892b0; line-height: 1.6; margin: 16px 0;">${server.description}</p>` : ''}
          
          <div class="tags">
            ${(server.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
            ${server.version ? `<span class="tag" style="color: #00f5d4;">${server.version}</span>` : ''}
          </div>
          
          <a href="minecraft://${server.ip}:${server.port}" class="btn">
            Join Server
          </a>
        </div>
      `;
    }
    
    loadServer();
  </script>
</body>
</html>
