name: Build and Deploy to GCP VM

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  GCP_PROJECT: manifest-virtue-492800-p9
  GCP_ZONE: us-west1-b
  GCP_INSTANCE: guildpost-worker

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Astro for Cloudflare
        run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MIXEDBREAD_API_KEY: ${{ secrets.MIXEDBREAD_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMMA_API_KEY: ${{ secrets.GEMMA_API_KEY }}

      - name: Deploy to GCP VM (using IAP)
        run: |
          # Setup gcloud for OS Login
          gcloud compute config-ssh --quiet || true
          
          # Create tarball
          tar -czf dist.tar.gz dist/
          
          # Copy to VM using IAP tunnel (bypasses firewall issues)
          gcloud compute scp --zone=$GCP_ZONE \
            --tunnel-through-iap \
            dist.tar.gz $GCP_INSTANCE:~/guildpost/ || echo "SCP may need retry"
            
          # SSH and setup
          gcloud compute ssh $GCP_INSTANCE --zone=$GCP_ZONE \
            --tunnel-through-iap \
            --command="
              mkdir -p ~/guildpost &&
              cd ~/guildpost &&
              tar -xzf dist.tar.gz &&
              npm install --production &&
              pm2 restart guildpost || pm2 start dist/server/entry.mjs --name guildpost &&
              pm2 save
            " || echo "Deployment may need manual setup"