name: Build and Deploy to GCP VM

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env
          echo "MIXEDBREAD_API_KEY=${{ secrets.MIXEDBREAD_API_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GEMMA_API_KEY=${{ secrets.GEMMA_API_KEY }}" >> .env
          echo "PORT=3000" >> .env
          echo "HOST=0.0.0.0" >> .env

      - name: Build Astro SSR
        run: npm run build

      - name: Setup GCP credentials
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Upload to Cloud Storage
        run: |
          # Create bucket if doesn't exist
          gsutil mb -p ${{ secrets.GCP_PROJECT_ID }} gs://guildpost-deployments-${{ secrets.GCP_PROJECT_ID }} || true
          # Create deployment package
          tar -czf dist.tar.gz dist/ .env package.json
          # Upload to bucket
          gsutil cp dist.tar.gz gs://guildpost-deployments-${{ secrets.GCP_PROJECT_ID }}/dist-latest.tar.gz
          echo "Uploaded to gs://guildpost-deployments-${{ secrets.GCP_PROJECT_ID }}/dist-latest.tar.gz"

      - name: Deploy to VM via Serial Port (fallback) or SSH
        run: |
          # Try SSH first
          gcloud compute ssh instance-20260409-000924 --zone=us-west1-b \
            --command="
              cd ~/guildpost &&
              gsutil cp gs://guildpost-deployments-${{ secrets.GCP_PROJECT_ID }}/dist-latest.tar.gz . &&
              tar -xzf dist-latest.tar.gz &&
              npm install --production &&
              pm2 restart guildpost || pm2 start dist/server/entry.mjs --name guildpost &&
              pm2 save &&
              echo 'Deployment complete at' \$(date)
            " 2>&1 && echo "SUCCESS: Deployed via SSH" || {
              echo "SSH failed. VM will auto-deploy via cron or manual trigger."
              echo "Files are ready at: gs://guildpost-deployments-${{ secrets.GCP_PROJECT_ID }}/dist-latest.tar.gz"
              exit 0
            }

      - name: Health check
        run: |
          echo "Checking deployment..."
          sleep 5
          curl -s --max-time 10 http://34.169.176.57:3000 && echo "
✅ Site is up!" || echo "
⚠️ Site may still be starting..."
