name: Build and Deploy to GCP VM

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env
          echo "MIXEDBREAD_API_KEY=${{ secrets.MIXEDBREAD_API_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GEMMA_API_KEY=${{ secrets.GEMMA_API_KEY }}" >> .env
          echo "PORT=3000" >> .env
          echo "HOST=0.0.0.0" >> .env

      - name: Build Astro SSR
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 34.169.176.57 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to GCP VM
        run: |
          # Create tar.gz of dist
          tar -czf dist.tar.gz dist/ .env package.json
          
          # Copy to VM using SSH key
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 dist.tar.gz justin-lo@34.169.176.57:~/guildpost/
          
          # SSH to VM and setup
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 justin-lo@34.169.176.57 "
            cd ~/guildpost &&
            tar -xzf dist.tar.gz &&
            npm install --production &&
            pm2 restart guildpost || pm2 start dist/server/entry.mjs --name guildpost &&
            pm2 save &&
            echo 'Deployment complete at' \$(date)
          "

      - name: Health check
        run: |
          echo "Checking deployment..."
          sleep 5
          curl -s --max-time 10 http://34.169.176.57:3000 && echo "
✅ Site is up!" || echo "
⚠️ Site may still be starting..."