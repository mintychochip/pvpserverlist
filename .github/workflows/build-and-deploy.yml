name: Build and Deploy to GCP VM

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  GCP_PROJECT: manifest-virtue-492800-p9
  GCP_ZONE: us-west1-b
  GCP_INSTANCE: guildpost-worker

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Astro for Cloudflare
        run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MIXEDBREAD_API_KEY: ${{ secrets.MIXEDBREAD_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMMA_API_KEY: ${{ secrets.GEMMA_API_KEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/guildpost_deploy
          chmod 600 ~/.ssh/guildpost_deploy
          
      - name: Add SSH key to VM
        run: |
          gcloud compute instances add-metadata $GCP_INSTANCE \
            --zone=$GCP_ZONE \
            --metadata-from-file ssh-keys="${{ secrets.GCP_SSH_KEY }}.pub"
            
      - name: Deploy to GCP VM
        run: |
          # Create tarball
          tar -czf dist.tar.gz dist/
          
          # Copy to VM
          gcloud compute scp --zone=$GCP_ZONE \
            --ssh-key-file=~/.ssh/guildpost_deploy \
            dist.tar.gz $GCP_INSTANCE:~/guildpost/
            
          # SSH and setup
          gcloud compute ssh $GCP_INSTANCE --zone=$GCP_ZONE \
            --ssh-key-file=~/.ssh/guildpost_deploy \
            --command="
              cd ~/guildpost &&
              tar -xzf dist.tar.gz &&
              npm install --production &&
              pm2 restart guildpost || pm2 start dist/server/entry.mjs --name guildpost &&
              pm2 save
            "