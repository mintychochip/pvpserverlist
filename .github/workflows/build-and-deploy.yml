name: Build and Deploy to GCP VM

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env
          echo "MIXEDBREAD_API_KEY=${{ secrets.MIXEDBREAD_API_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GEMMA_API_KEY=${{ secrets.GEMMA_API_KEY }}" >> .env
          echo "PORT=3000" >> .env
          echo "HOST=0.0.0.0" >> .env

      - name: Build Astro SSR
        run: npm run build

      - name: Setup GCP credentials
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}


      - name: Deploy to GCP VM via gcloud
        run: |
          # Ensure gcloud SSH works
          gcloud compute config-ssh --quiet
          
          # Deploy dist folder to VM using gcloud
          gcloud compute scp --recurse --zone=us-west1-b --quiet dist/ instance-20260409-000924:~/guildpost/dist/
          
          # Deploy package.json
          gcloud compute scp --zone=us-west1-b --quiet package.json instance-20260409-000924:~/guildpost/
          
          # Restart the app on VM
          gcloud compute ssh instance-20260409-000924 --zone=us-west1-b --quiet --command="
            cd ~/guildpost &&
            npm install --production &&
            pm2 restart guildpost || pm2 start dist/server/entry.mjs --name guildpost &&
            pm2 save
          "

      - name: Health check
        run: |
          echo "Waiting for deployment..."
          sleep 10
          curl -s http://34.169.176.57:3000 || echo "Health check failed - may need to wait for startup"
