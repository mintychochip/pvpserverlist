    - contentinfo [ref=e561]:
      - generic [ref=e562]:
        - heading "Frequently Asked Questions" [level=2] [ref=e563]
        - generic [ref=e564]:
          - generic [ref=e565]:
            - heading "What is PvP Index?" [level=3] [ref=e566]
            - paragraph [ref=e567]: PvP Index is a Minecraft server list website created to help players find the best PvP servers. With multiple filters, ordered lists, categories, and real-time server status, finding your ideal server is easier than ever.
          - generic [ref=e568]:
            - heading "Who lists the servers?" [level=3] [ref=e569]
            - paragraph [ref=e570]: Most servers are posted by their owners. We fill out and correct any missing or inaccurate info to ensure only quality servers are listed. A small selection have been posted by us to provide a wider array of options.
          - generic [ref=e571]:
            - heading "What are the requirements to list a server?" [level=3] [ref=e572]
            - paragraph [ref=e573]: We allow all sorts of servers as long as they are of good quality and follow our TOS guidelines. We do not allow servers hosted on Aternos or Minehut.
          - generic [ref=e574]:
            - heading "Do you support Voting?" [level=3] [ref=e575]
            - paragraph [ref=e576]: Absolutely! Voting and Votifier are 100% supported — though not all servers are Votifier-enabled. You can vote once every 24 hours and optionally leave a review. Voting through VPN or Proxy is not allowed. Votes over 15 days old are deleted to keep results fresh.
          - generic [ref=e577]:
            - heading "How can I contact you?" [level=3] [ref=e578]
            - paragraph [ref=e579]:
              - text: You can reach out via email at
              - link "info@pvpserverlist.com" [ref=e580] [cursor=pointer]:
                - /url: mailto:info@pvpserverlist.com
              - text: ", or message us via Discord or Twitter. You can also use the contact form below."
        - generic [ref=e581]:
