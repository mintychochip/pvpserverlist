      - generic [ref=e552]:
        - heading "Frequently Asked Questions" [level=2] [ref=e553]
        - generic [ref=e554]:
          - generic [ref=e555]:
            - heading "What is PvP Index?" [level=3] [ref=e556]
            - paragraph [ref=e557]: PvP Index is a Minecraft server list website created to help players find the best PvP servers. With multiple filters, ordered lists, categories, and real-time server status, finding your ideal server is easier than ever.
          - generic [ref=e558]:
            - heading "Who lists the servers?" [level=3] [ref=e559]
            - paragraph [ref=e560]: Most servers are posted by their owners. We fill out and correct any missing or inaccurate info to ensure only quality servers are listed. A small selection have been posted by us to provide a wider array of options.
          - generic [ref=e561]:
            - heading "What are the requirements to list a server?" [level=3] [ref=e562]
            - paragraph [ref=e563]: We allow all sorts of servers as long as they are of good quality and follow our TOS guidelines. We do not allow servers hosted on Aternos or Minehut.
          - generic [ref=e564]:
            - heading "Do you support Voting?" [level=3] [ref=e565]
            - paragraph [ref=e566]: Absolutely! Voting and Votifier are 100% supported — though not all servers are Votifier-enabled. You can vote once every 24 hours and optionally leave a review. Voting through VPN or Proxy is not allowed. Votes over 15 days old are deleted to keep results fresh.
          - generic [ref=e567]:
            - heading "How can I contact you?" [level=3] [ref=e568]
            - paragraph [ref=e569]:
              - text: You can reach out via email at
              - link "info@pvpserverlist.com" [ref=e570] [cursor=pointer]:
                - /url: mailto:info@pvpserverlist.com
              - text: ", or message us via Discord or Twitter. You can also use the contact form below."
